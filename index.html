<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>ID/KEY Writer</title>
<style>
* { box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    max-width: 480px;
    margin: 0 auto;
    padding: 15px;
    background: #1a1a2e;
    color: #eee;
}
h1 { color: #88ccff; text-align: center; font-size: 22px; }
h3 { color: #ffcc44; margin: 10px 0 5px; }

.card {
    background: #16213e;
    border-radius: 8px;
    padding: 12px;
    margin: 10px 0;
}

label { display: block; margin: 8px 0 4px; color: #aaa; font-size: 14px; }

input[type=text], select {
    width: 100%;
    padding: 10px;
    border: 1px solid #444;
    border-radius: 4px;
    background: #0f3460;
    color: #fff;
    font-size: 15px;
}

button {
    background: #00cc66;
    color: #000;
    border: none;
    padding: 12px 20px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    margin: 5px 5px 5px 0;
    width: 100%;
}
button:hover { background: #00ff88; }
button:disabled { background: #555; color: #999; cursor: not-allowed; }
button.secondary { background: #ff8844; color: #fff; }
button.danger { background: #ff4444; color: #fff; }

#video {
    width: 100%;
    border-radius: 8px;
    background: #000;
    max-height: 400px;
}
#canvas { display: none; }

.status {
    padding: 10px;
    border-radius: 4px;
    background: #0f3460;
    margin-top: 8px;
    font-size: 14px;
    word-break: break-all;
}
.ok { color: #44ff44; }
.err { color: #ff4444; }
.info { color: #ffcc44; }

.hex {
    font-family: monospace;
    word-break: break-all;
    color: #88ddff;
}

.step-num {
    display: inline-block;
    width: 22px;
    height: 22px;
    background: #88ccff;
    color: #000;
    border-radius: 50%;
    text-align: center;
    line-height: 22px;
    font-weight: bold;
    margin-right: 5px;
}
</style>
</head>
<body>

<h1>Device ID/KEY Writer</h1>

<div class='card'>
<h3><span class='step-num'>1</span>ESP32 Tool IP</h3>
<label>Enter or confirm the IP shown on the ESP32 screen:</label>
<input type='text' id='esp_ip' placeholder='e.g. 192.168.43.142' value=''>
<button onclick='testConnection()'>Test Connection</button>
<div id='conn_status' class='status'>Not tested</div>
</div>

<div class='card'>
<h3><span class='step-num'>2</span>Scan Device QR Code</h3>
<video id='video' autoplay playsinline></video>
<canvas id='canvas'></canvas>
<button id='startScanBtn' onclick='startScan()'>Start Scan</button>
<button id='stopScanBtn' onclick='stopScan()' class='danger' style='display:none;'>Stop Scan</button>
<div id='scan_status' class='status'>Waiting to scan</div>
<label style='margin-top:8px;'>Or enter ID manually (16 hex chars):</label>
<input type='text' id='manual_id' placeholder='e.g. 0123456789ABCDEF'>
<button onclick='useManualId()' class='secondary'>Use Manual ID</button>
</div>

<div class='card'>
<h3><span class='step-num'>3</span>Fetch KEY from Server</h3>
<p>Device ID: <span id='show_id' class='hex'>--</span></p>
<button id='fetchKeyBtn' onclick='fetchKey()' disabled>Fetch KEY</button>
<p>KEY: <span id='show_key' class='hex'>--</span></p>
</div>

<div class='card'>
<h3><span class='step-num'>4</span>Send to ESP32</h3>
<button id='sendBtn' onclick='sendToEsp()' disabled>Send ID + KEY to ESP32</button>
<div id='send_status' class='status'>Waiting to send</div>
<p style='color:#aaa;font-size:13px;'>After sending, press the START button on the ESP32 to begin writing.</p>
</div>

<!-- jsQR library -->
<script src='https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js'></script>

<!-- Eruda 移动端控制台（手机右下角会出现一个小齿轮按钮，点开看 Console） -->
<script src='https://cdn.jsdelivr.net/npm/eruda'></script>
<script>eruda.init();</script>

<script>
// ============ Config ============
// Sylver Lining server: GET /device/key/{ubilinkId}
// Response: {"code":0,"msg":"success","data":{"ubilink_key":"..."}}
const KEY_API_BASE = 'https://open-platform-prod.sylver-lining.com/device/key/';

// ============ Global state ============
let currentId = null;
let currentKey = null;
let videoStream = null;
let scanning = false;

// Pre-fill IP from ?ip= URL param
const params = new URLSearchParams(location.search);
if (params.get('ip')) {
    document.getElementById('esp_ip').value = params.get('ip');
}

// Reset all previous scan and query results
function resetAllResults() {
    currentId = null;
    currentKey = null;
    document.getElementById('show_id').textContent = '--';
    document.getElementById('show_key').textContent = '--';
    document.getElementById('manual_id').value = '';
    document.getElementById('scan_status').textContent = 'Scanning...';
    document.getElementById('scan_status').className = 'status info';
    document.getElementById('fetchKeyBtn').disabled = true;
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('send_status').textContent = 'Waiting to send';
    document.getElementById('send_status').className = 'status';
}

// ============ Step 1: Test connection ============
async function testConnection() {
    const ip = document.getElementById('esp_ip').value.trim();
    const el = document.getElementById('conn_status');
    if (!ip) { el.textContent = 'Please enter IP'; el.className = 'status err'; return; }
    el.textContent = 'Connecting...';
    el.className = 'status info';
    try {
        const resp = await fetch(`http://${ip}/status`, { method: 'GET', mode: 'cors' });
        if (resp.ok) {
            el.textContent = 'Connected to ESP32: ' + ip;
            el.className = 'status ok';
        } else {
            el.textContent = 'Failed: HTTP ' + resp.status;
            el.className = 'status err';
        }
    } catch (e) {
        el.textContent = 'Failed: ' + e.message + ' (check IP and network)';
        el.className = 'status err';
    }
}

// ============ Step 2: Scan QR ============
async function startScan() {
    // Clear previous scan results each time camera starts
    resetAllResults();

    const video = document.getElementById('video');
    try {
        videoStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment' }
        });
        video.srcObject = videoStream;
        scanning = true;
        document.getElementById('startScanBtn').style.display = 'none';
        document.getElementById('stopScanBtn').style.display = 'block';
        requestAnimationFrame(scanLoop);
    } catch (e) {
        document.getElementById('scan_status').textContent = 'Camera error: ' + e.message;
        document.getElementById('scan_status').className = 'status err';
    }
}

function stopScan() {
    scanning = false;
    if (videoStream) {
        videoStream.getTracks().forEach(t => t.stop());
        videoStream = null;
    }
    document.getElementById('startScanBtn').style.display = 'block';
    document.getElementById('stopScanBtn').style.display = 'none';
}

function scanLoop() {
    if (!scanning) return;
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imgData.data, canvas.width, canvas.height, { inversionAttempts: 'dontInvert' });
        if (code && code.data) {
            onScanned(code.data);
            return;
        }
    }
    requestAnimationFrame(scanLoop);
}

function onScanned(data) {
    stopScan();
    const id = normalizeId(data);
    if (id) {
        setScannedId(id);
    } else {
        document.getElementById('scan_status').textContent = 'Got content but bad format: ' + data;
        document.getElementById('scan_status').className = 'status err';
    }
}

// Normalize input to 16-char hex ID (strip spaces/colons/hyphens), uppercase
function normalizeId(s) {
    if (!s) return null;
    const clean = s.replace(/[\s:\-]/g, '').toUpperCase();
    if (/^[0-9A-F]{16}$/.test(clean)) return clean;
    return null;
}

function setScannedId(id) {
    currentId = id;
    document.getElementById('show_id').textContent = id;
    document.getElementById('scan_status').textContent = 'ID scanned: ' + id;
    document.getElementById('scan_status').className = 'status ok';
    document.getElementById('fetchKeyBtn').disabled = false;
    // Clear previous KEY and send status
    currentKey = null;
    document.getElementById('show_key').textContent = '--';
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('send_status').textContent = 'Waiting to send';
    document.getElementById('send_status').className = 'status';
}

function useManualId() {
    const v = document.getElementById('manual_id').value.trim();
    const id = normalizeId(v);
    if (!id) {
        document.getElementById('scan_status').textContent = 'Bad ID format (need 16 hex chars)';
        document.getElementById('scan_status').className = 'status err';
        return;
    }
    setScannedId(id);
}

// ============ Step 3: Fetch KEY ============
async function fetchKey() {
    if (!currentId) return;
    const el = document.getElementById('show_key');
    el.textContent = 'Querying...';
    try {
        const resp = await fetch(KEY_API_BASE + currentId, { method: 'GET' });
        if (!resp.ok) {
            throw new Error('HTTP ' + resp.status);
        }
        const json = await resp.json();
        console.log('API response:', json);

        // Server format: {"code":0,"msg":"success","data":{"ubilink_key":"..."}}
        if (json.code !== 0)
        {
            throw new Error('Server returned code=' + json.code + ' msg=' + (json.msg || ''));
        }
        const key = json.data && json.data.ubilink_key;
        if (!key)
        {
            el.innerHTML = 'No ubilink_key field. Response:<br><pre style="font-size:11px;color:#aaa;max-height:200px;overflow:auto;">' +
                JSON.stringify(json, null, 2) + '</pre>';
            return;
        }
        const normKey = key.replace(/[\s:\-]/g, '').toUpperCase();
        if (!/^[0-9A-F]{32}$/.test(normKey)) {
            throw new Error('Bad KEY format (need 32 hex chars), got: ' + key);
        }
        currentKey = normKey;
        el.textContent = normKey;
        document.getElementById('sendBtn').disabled = false;
    } catch (e) {
        el.textContent = 'Failed: ' + e.message;
    }
}

// ============ Step 4: Send to ESP32 ============
async function sendToEsp() {
    const ip = document.getElementById('esp_ip').value.trim();
    if (!ip) { alert('Please enter ESP32 IP first'); return; }
    if (!currentId || !currentKey) { alert('ID or KEY not ready'); return; }

    const el = document.getElementById('send_status');
    el.textContent = 'Sending...';
    el.className = 'status info';

    const data = new URLSearchParams();
    data.append('id',  currentId);
    data.append('key', currentKey);

    try {
        const resp = await fetch(`http://${ip}/writeIdKey`, {
            method: 'POST',
            body: data,
            mode: 'cors'
        });
        const json = await resp.json();
        if (json.ok) {
            el.innerHTML = '<b>Sent!</b><br>Press the START button on the ESP32 to begin writing.';
            el.className = 'status ok';
        } else {
            el.textContent = 'Failed: ' + (json.err || 'unknown error');
            el.className = 'status err';
        }
    } catch (e) {
        el.textContent = 'Send failed: ' + e.message;
        el.className = 'status err';
    }
}
</script>

</body>
</html>
